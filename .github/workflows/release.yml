name: Build & Release

on:
  push:
    tags:
      - "v*"          # e.g. push tag v1.0.0 to cut a release
  workflow_dispatch:   # or run manually from the Actions tab

permissions:
  contents: write      # needed to attach files to a Release

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Zip app
        run: ditto -c -k --keepParent DesktopScaleRuler.app DesktopScaleRuler.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopScaleRuler
          path: DesktopScaleRuler.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DesktopScaleRuler.zip
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (self-contained single exe)
        run: dotnet publish windows/DesktopScaleRuler.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none -o windows/publish

      - name: Zip
        run: Compress-Archive -Path windows/publish/* -DestinationPath DesktopScaleRuler-Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopScaleRuler-Windows
          path: DesktopScaleRuler-Windows.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DesktopScaleRuler-Windows.zip
          generate_release_notes: true
